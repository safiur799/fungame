services:
  - type: web
    name: daily-number-draw
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: daily_number_draw
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: DRAW_TIMEZONE
        value: Asia/Kolkata
